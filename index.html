<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>넷마블 방문예약</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'NetmarbleFont';
            src: url('netmarbleB.ttf') format('truetype');
            font-weight: 700;
            font-display: swap;
        }
        @font-face {
            font-family: 'NetmarbleFont';
            src: url('netmarbleM.ttf') format('truetype');
            font-weight: 500;
            font-display: swap;
        }
        @font-face {
            font-family: 'NetmarbleFont';
            src: url('netmarbleL.ttf') format('truetype');
            font-weight: 300;
            font-display: swap;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --nm-brown-dark: #452f27;
            --nm-brown-mid: #6b4c41;
            --nm-brown-light: #c5ae9e;
            --nm-bg: #f9f6f4;
            --nm-white: #ffffff;
            --nm-text: #2d1f1a;
            --nm-text-sub: #7a6560;
            --nm-border: #e8ddd9;
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', '맑은 고딕', 'Malgun Gothic', sans-serif;
            background: var(--nm-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            word-break: keep-all;
        }

        /* ─── 헤더 ─── */
        .site-header {
            background: var(--nm-brown-dark);
            padding: 0 1.5rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-logo-text {
            color: var(--nm-white);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .header-admin-link {
            color: var(--nm-brown-light);
            font-size: 0.78rem;
            text-decoration: none;
            border: 1px solid var(--nm-brown-light);
            padding: 0.3rem 0.75rem;
            border-radius: 4px;
            opacity: 0.85;
            transition: opacity 0.15s;
        }
        .header-admin-link:hover { opacity: 1; }

        /* ─── 본문 ─── */
        .page-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2.5rem 1rem 4rem;
        }

        /* ─── 로고 ─── */
        .company-logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-main {
            font-family: 'NetmarbleFont', 'Noto Sans KR', sans-serif;
            font-size: 2.6rem;
            font-weight: 700;
            color: var(--nm-brown-dark);
            letter-spacing: -0.5px;
            line-height: 1;
        }
        .logo-sub {
            font-size: 0.82rem;
            color: var(--nm-brown-light);
            margin-top: 0.4rem;
            font-weight: 500;
            letter-spacing: 0.08em;
        }

        /* ─── 카드 공통 ─── */
        .card {
            background: var(--nm-white);
            border-radius: 14px;
            box-shadow: 0 2px 16px rgba(69,47,39,0.08);
            width: 100%;
            max-width: 460px;
            margin-bottom: 0.9rem;
            overflow: hidden;
        }

        /* ─── 메인 액션 카드 ─── */
        .action-body {
            padding: 2rem 1.8rem 0;
            text-align: center;
        }
        .action-desc {
            font-size: 0.97rem;
            color: var(--nm-text-sub);
            line-height: 1.7;
        }
        .action-desc strong {
            font-size: 1.05rem;
            color: var(--nm-text);
            font-weight: 700;
        }
        .start-btn {
            display: block;
            width: 100%;
            background: var(--nm-brown-dark);
            color: var(--nm-white);
            border: none;
            border-radius: 9px;
            padding: 1.05rem;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            margin: 1.3rem 0 0;
            transition: background 0.2s;
            letter-spacing: 0.05em;
        }
        .start-btn:hover { background: var(--nm-brown-mid); }

        .action-links {
            display: flex;
            border-top: 1px solid var(--nm-border);
            margin-top: 1.3rem;
        }
        .action-link {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            padding: 0.9rem;
            font-size: 0.88rem;
            color: var(--nm-text-sub);
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
        }
        .action-link:hover {
            background: var(--nm-bg);
            color: var(--nm-brown-dark);
        }
        .action-link + .action-link {
            border-left: 1px solid var(--nm-border);
        }

        /* ─── 링크 복사 카드 ─── */
        .copy-card {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.9rem 1.4rem;
            background: var(--nm-white);
            border-radius: 14px;
            box-shadow: 0 2px 16px rgba(69,47,39,0.08);
            width: 100%;
            max-width: 460px;
            margin-bottom: 0.9rem;
            border: none;
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.88rem;
            color: var(--nm-text-sub);
            transition: background 0.15s, color 0.15s;
            text-align: left;
        }
        .copy-card:hover {
            background: #f2ebe7;
            color: var(--nm-brown-dark);
        }
        .copy-card .copy-icon {
            font-size: 1rem;
            flex-shrink: 0;
        }

        /* ─── 카드 헤더 ─── */
        .card-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 1.3rem;
            border-bottom: 1px solid var(--nm-border);
        }
        .card-header-icon {
            color: var(--nm-brown-dark);
            font-size: 1rem;
        }
        .card-header-title {
            font-size: 0.97rem;
            font-weight: 700;
            color: var(--nm-text);
        }

        /* ─── 방문절차 ─── */
        .process-wrap {
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            padding: 1.4rem 1rem;
        }
        .process-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.55rem;
        }
        .step-circle {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: var(--nm-bg);
            border: 1.5px solid var(--nm-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }
        .step-label {
            font-size: 0.76rem;
            color: var(--nm-text-sub);
            text-align: center;
            line-height: 1.3;
            font-weight: 500;
        }
        .step-arrow {
            color: var(--nm-brown-light);
            font-size: 1.2rem;
            margin-bottom: 1.6rem;
            flex-shrink: 0;
        }

        /* ─── 토스트 ─── */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(69,47,39,0.92);
            color: white;
            padding: 0.7rem 1.4rem;
            border-radius: 20px;
            font-size: 0.88rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <!-- 헤더 -->
    <header class="site-header">
        <span class="header-logo-text">넷마블 방문예약</span>
        <a href="admin.html" class="header-admin-link">관리자</a>
    </header>

    <!-- 본문 -->
    <main class="page-body">

        <!-- 로고 -->
        <div class="company-logo-area">
            <div class="logo-main">netmarble</div>
            <div class="logo-sub">방문객 예약 관리 시스템</div>
        </div>

        <!-- 메인 액션 카드 -->
        <div class="card">
            <div class="action-body">
                <p class="action-desc">
                    방문신청을 하시려면<br>
                    <strong>시작하기</strong> 버튼을 눌러주세요.
                </p>
                <a href="register.html" class="start-btn">시작하기</a>
            </div>
            <div class="action-links">
                <a href="lookup.html" class="action-link">🔍&nbsp; 방문신청조회</a>
                <a href="#guide" class="action-link">❓&nbsp; 이용안내</a>
            </div>
        </div>

        <!-- 링크 복사 카드 -->
        <button class="copy-card" onclick="copyRegisterLink()">
            <span class="copy-icon">🔗</span>
            <span>방문 신청 링크 복사해서 발송하기</span>
        </button>

        <!-- 방문절차안내 -->
        <div class="card" id="guide">
            <div class="card-header">
                <span class="card-header-icon">🔑</span>
                <span class="card-header-title">방문절차안내</span>
            </div>
            <div class="process-wrap">
                <div class="process-step">
                    <div class="step-circle">📝</div>
                    <div class="step-label">방문신청</div>
                </div>
                <div class="step-arrow">›</div>
                <div class="process-step">
                    <div class="step-circle">✅</div>
                    <div class="step-label">내부 승인</div>
                </div>
                <div class="step-arrow">›</div>
                <div class="process-step">
                    <div class="step-circle">🪪</div>
                    <div class="step-label">방문수속</div>
                </div>
                <div class="step-arrow">›</div>
                <div class="process-step">
                    <div class="step-circle">🏢</div>
                    <div class="step-label">입실</div>
                </div>
            </div>
        </div>

    </main>

    <div id="toast" class="toast">✅ 방문 신청 링크가 복사되었습니다!</div>

    <script>
        function copyRegisterLink() {
            let currentUrl = window.location.href;
            if (currentUrl.endsWith('index.html')) {
                currentUrl = currentUrl.replace('index.html', '');
            }
            if (!currentUrl.endsWith('/')) {
                currentUrl += '/';
            }
            const registerLink = currentUrl + 'register.html';

            navigator.clipboard.writeText(registerLink).then(() => {
                showToast();
            }).catch(err => {
                alert('링크 복사에 실패했습니다: ' + err);
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
    </script>
</body>
</html>
