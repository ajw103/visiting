<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>넷마블 방문예약</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'NetmarbleFont';
            src: url('netmarbleB.ttf') format('truetype');
            font-weight: 700;
            font-display: swap;
        }
        @font-face {
            font-family: 'NetmarbleFont';
            src: url('netmarbleM.ttf') format('truetype');
            font-weight: 500;
            font-display: swap;
        }
        @font-face {
            font-family: 'NetmarbleFont';
            src: url('netmarbleL.ttf') format('truetype');
            font-weight: 300;
            font-display: swap;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --nm-brown-dark: #452f27;
            --nm-brown-mid: #6b4c41;
            --nm-brown-light: #c5ae9e;
            --nm-bg: #f9f6f4;
            --nm-white: #ffffff;
            --nm-text: #2d1f1a;
            --nm-text-sub: #7a6560;
            --nm-border: #e8ddd9;
        }

        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', '맑은 고딕', 'Malgun Gothic', sans-serif;
            background: var(--nm-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            word-break: keep-all;
        }

        /* ─── 헤더 ─── */
        .site-header {
            background: var(--nm-brown-dark);
            padding: 0 1.5rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-logo-text {
            color: var(--nm-white);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .header-admin-link {
            color: var(--nm-brown-light);
            font-size: 0.78rem;
            text-decoration: none;
            border: 1px solid var(--nm-brown-light);
            padding: 0.3rem 0.75rem;
            border-radius: 4px;
            opacity: 0.85;
            transition: opacity 0.15s;
        }
        .header-admin-link:hover { opacity: 1; }

        /* ─── 본문 ─── */
        .page-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2.5rem 1rem 3rem;
        }

        /* ─── 로고 ─── */
        .company-logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-main {
            font-family: 'NetmarbleFont', 'Noto Sans KR', sans-serif;
            font-size: 2.6rem;
            font-weight: 700;
            color: var(--nm-brown-dark);
            letter-spacing: -0.5px;
            line-height: 1;
        }
        .logo-sub {
            font-size: 0.82rem;
            color: var(--nm-brown-light);
            margin-top: 0.4rem;
            font-weight: 500;
            letter-spacing: 0.08em;
        }

        /* ─── 통합 카드 ─── */
        .card {
            background: var(--nm-white);
            border-radius: 16px;
            box-shadow: 0 2px 20px rgba(69,47,39,0.09);
            width: 100%;
            max-width: 460px;
            overflow: hidden;
        }

        /* ─── 액션 영역 ─── */
        .action-body {
            padding: 2rem 1.8rem 1.8rem;
            text-align: center;
        }
        .action-desc {
            font-size: 0.97rem;
            color: var(--nm-text-sub);
            line-height: 1.75;
        }
        .action-desc strong {
            font-size: 1.05rem;
            color: var(--nm-text);
            font-weight: 700;
        }
        .start-btn {
            display: block;
            width: 100%;
            background: var(--nm-brown-dark);
            color: var(--nm-white);
            border: none;
            border-radius: 10px;
            padding: 1.05rem;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            margin: 1.3rem 0 0;
            transition: background 0.2s;
            letter-spacing: 0.04em;
        }
        .start-btn:hover { background: var(--nm-brown-mid); }

        .admin-btn {
            display: block;
            width: 100%;
            background: transparent;
            color: var(--nm-text-sub);
            border: 1.5px solid var(--nm-border);
            border-radius: 10px;
            padding: 0.85rem;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            margin-top: 0.7rem;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            text-align: center;
        }
        .admin-btn:hover {
            background: var(--nm-bg);
            color: var(--nm-brown-dark);
            border-color: var(--nm-brown-light);
        }

        /* ─── 방문절차 영역 ─── */
        .process-section {
            border-top: 1px solid var(--nm-border);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 1.4rem;
            border-bottom: 1px solid var(--nm-border);
        }
        .card-header-icon { color: var(--nm-brown-dark); font-size: 1rem; }
        .card-header-title { font-size: 0.95rem; font-weight: 700; color: var(--nm-text); }

        .process-wrap {
            display: flex;
            align-items: center;
            justify-content: space-evenly;
            padding: 1.4rem 0.8rem;
        }
        .process-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.55rem;
        }
        .step-circle {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: var(--nm-bg);
            border: 1.5px solid var(--nm-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }
        .step-label {
            font-size: 0.74rem;
            color: var(--nm-text-sub);
            text-align: center;
            line-height: 1.3;
            font-weight: 500;
        }
        .step-arrow {
            color: var(--nm-brown-light);
            font-size: 1.1rem;
            margin-bottom: 1.8rem;
            flex-shrink: 0;
        }

        /* ─── 공유 모달 ─── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(45,31,26,0.55);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: var(--nm-white);
            border-radius: 18px;
            width: 100%;
            max-width: 440px;
            overflow: hidden;
            box-shadow: 0 12px 48px rgba(69,47,39,0.22);
            animation: modalIn 0.2s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(12px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-header {
            background: var(--nm-brown-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.4rem;
        }
        .modal-title { color: var(--nm-white); font-size: 0.97rem; font-weight: 700; }
        .modal-close {
            background: none; border: none;
            color: var(--nm-brown-light); font-size: 1.3rem;
            cursor: pointer; line-height: 1; padding: 0.1rem 0.3rem;
            transition: color 0.15s;
        }
        .modal-close:hover { color: var(--nm-white); }
        .modal-body { padding: 1.6rem 1.4rem 1.4rem; }
        .modal-label {
            font-size: 0.83rem; color: var(--nm-text-sub);
            margin-bottom: 0.65rem; font-weight: 500;
        }
        .modal-input-row { display: flex; gap: 0.5rem; }
        .modal-email-input {
            flex: 1;
            border: 1.5px solid var(--nm-border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            font-family: 'Noto Sans KR', sans-serif;
            color: var(--nm-text);
            outline: none;
            transition: border-color 0.15s;
        }
        .modal-email-input:focus { border-color: var(--nm-brown-dark); }
        .modal-email-input::placeholder { color: var(--nm-brown-light); }
        .modal-send-btn {
            background: var(--nm-brown-dark); color: white;
            border: none; border-radius: 8px;
            padding: 0.75rem 1.1rem;
            font-size: 0.9rem; font-weight: 700;
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            white-space: nowrap;
            transition: background 0.15s;
        }
        .modal-send-btn:hover { background: var(--nm-brown-mid); }
        .modal-divider {
            display: flex; align-items: center; gap: 0.8rem;
            margin: 1.2rem 0;
            color: var(--nm-brown-light); font-size: 0.78rem;
        }
        .modal-divider::before, .modal-divider::after {
            content: ''; flex: 1; height: 1px; background: var(--nm-border);
        }
        .modal-copy-btn {
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            width: 100%;
            background: var(--nm-bg);
            border: 1.5px solid var(--nm-border);
            border-radius: 8px;
            padding: 0.85rem 1rem;
            font-size: 0.9rem; font-weight: 600;
            color: var(--nm-brown-dark);
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            transition: background 0.15s, border-color 0.15s;
        }
        .modal-copy-btn:hover { background: #f0ebe7; border-color: var(--nm-brown-light); }
        .modal-hint {
            font-size: 0.76rem; color: var(--nm-brown-light);
            text-align: center; margin-top: 0.75rem; line-height: 1.5;
        }

        /* ─── 토스트 ─── */
        .toast {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
            background: rgba(69,47,39,0.92); color: white;
            padding: 0.7rem 1.4rem; border-radius: 20px;
            font-size: 0.88rem; opacity: 0;
            transition: opacity 0.3s; pointer-events: none;
            z-index: 1000; white-space: nowrap;
        }
        .toast.show { opacity: 1; }

        /* ─── PC 반응형 (768px 이상) ─── */
        @media (min-width: 768px) {
            .site-header { height: 64px; padding: 0 2.5rem; }
            .header-logo-text { font-size: 1.25rem; }
            .header-admin-link { font-size: 0.88rem; padding: 0.4rem 1rem; }

            .page-body { padding: 4rem 2rem 5rem; }

            .company-logo-area { margin-bottom: 2.8rem; }
            .logo-main { font-size: 4rem; }
            .logo-sub { font-size: 1rem; margin-top: 0.6rem; }

            .card { max-width: 580px; border-radius: 20px; }

            .action-body { padding: 2.8rem 3rem 2.2rem; }
            .action-desc { font-size: 1.1rem; line-height: 1.8; }
            .action-desc strong { font-size: 1.2rem; }
            .start-btn { font-size: 1.15rem; padding: 1.2rem; margin-top: 1.6rem; border-radius: 12px; }

            .card-header { padding: 1.1rem 1.8rem; }
            .card-header-title { font-size: 1.05rem; }

            .process-wrap { padding: 1.8rem 1.2rem; }
            .step-circle { width: 70px; height: 70px; font-size: 1.8rem; }
            .step-label { font-size: 0.88rem; }
            .step-arrow { font-size: 1.4rem; margin-bottom: 2.2rem; }

            .modal-box { max-width: 500px; }
            .modal-body { padding: 2rem 1.8rem 1.8rem; }
            .modal-label { font-size: 0.92rem; }
            .modal-email-input { font-size: 0.95rem; padding: 0.85rem 1.1rem; }
            .modal-send-btn { font-size: 0.95rem; padding: 0.85rem 1.3rem; }
            .modal-copy-btn { font-size: 0.95rem; padding: 0.95rem; }
        }
    </style>
</head>
<body>

    <!-- 헤더 -->
    <header class="site-header">
        <span class="header-logo-text">넷마블 방문예약</span>
    </header>

    <!-- 본문 -->
    <main class="page-body">

        <!-- 로고 -->
        <div class="company-logo-area">
            <div class="logo-main">netmarble</div>
            <div class="logo-sub">방문객 예약 관리 시스템</div>
        </div>

        <!-- 통합 카드 -->
        <div class="card">

            <!-- 액션 영역 -->
            <div class="action-body">
                <p class="action-desc">
                    방문객에게 신청 링크를 전달하시려면<br>
                    아래 <strong>발송하기</strong> 버튼을 눌러주세요.
                </p>
                <button class="start-btn" onclick="openShareModal()">방문 신청 링크 발송하기</button>
                <a href="admin.html" class="admin-btn">내 방문예약 보기</a>
            </div>

            <!-- 방문절차안내 -->
            <div class="process-section">
                <div class="card-header">
                    <span class="card-header-icon">🔑</span>
                    <span class="card-header-title">방문절차안내</span>
                </div>
                <div class="process-wrap">
                    <div class="process-step">
                        <div class="step-circle">📝</div>
                        <div class="step-label">방문신청</div>
                    </div>
                    <div class="step-arrow">›</div>
                    <div class="process-step">
                        <div class="step-circle">✅</div>
                        <div class="step-label">내부 승인</div>
                    </div>
                    <div class="step-arrow">›</div>
                    <div class="process-step">
                        <div class="step-circle">🪪</div>
                        <div class="step-label">방문수속</div>
                    </div>
                    <div class="step-arrow">›</div>
                    <div class="process-step">
                        <div class="step-circle">🏢</div>
                        <div class="step-label">입실</div>
                    </div>
                </div>
            </div>

        </div>

    </main>

    <!-- 공유 모달 -->
    <div class="modal-overlay" id="shareModal" onclick="handleOverlayClick(event)">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title">🔗 방문 신청 링크 발송</span>
                <button class="modal-close" onclick="closeShareModal()">✕</button>
            </div>
            <div class="modal-body">
                <p class="modal-label">링크를 받으시려는 분의 이메일 주소를 입력해 주세요.</p>
                <div class="modal-input-row">
                    <input
                        type="email"
                        id="shareEmailInput"
                        class="modal-email-input"
                        placeholder="example@email.com"
                        onkeydown="if(event.key==='Enter') sendViaEmail()"
                    >
                    <button class="modal-send-btn" onclick="sendViaEmail()">발송하기</button>
                </div>

                <div class="modal-divider">또는</div>

                <button class="modal-copy-btn" onclick="copyShareLink()">
                    📋 &nbsp;링크 직접 복사하기
                </button>
                <p class="modal-hint">이메일 없이 링크를 직접 복사하여 전달하셔도 됩니다.</p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        function getRegisterLink() {
            let currentUrl = window.location.href;
            if (currentUrl.endsWith('index.html')) {
                currentUrl = currentUrl.replace('index.html', '');
            }
            if (!currentUrl.endsWith('/')) {
                currentUrl += '/';
            }
            return currentUrl + 'register.html';
        }

        function openShareModal() {
            document.getElementById('shareModal').classList.add('open');
            setTimeout(() => document.getElementById('shareEmailInput').focus(), 100);
        }

        function closeShareModal() {
            document.getElementById('shareModal').classList.remove('open');
            document.getElementById('shareEmailInput').value = '';
        }

        function handleOverlayClick(e) {
            if (e.target === document.getElementById('shareModal')) closeShareModal();
        }

        function sendViaEmail() {
            const email = document.getElementById('shareEmailInput').value.trim();
            if (!email) {
                document.getElementById('shareEmailInput').focus();
                return;
            }
            const link = getRegisterLink();
            const subject = encodeURIComponent('[넷마블 방문예약] 방문 신청 링크 안내');
            const body = encodeURIComponent(
                '안녕하세요.\n\n넷마블 방문예약 링크를 안내드립니다.\n\n' +
                '▶ 방문 신청 링크\n' + link + '\n\n' +
                '위 링크를 클릭하시면 방문 신청 페이지로 이동합니다.\n' +
                '방문 신청 후 담당자 승인을 거쳐 방문이 확정됩니다.\n\n' +
                '감사합니다.\n넷마블 방문예약 시스템'
            );
            window.location.href = `mailto:${encodeURIComponent(email)}?subject=${subject}&body=${body}`;
            closeShareModal();
        }

        function copyShareLink() {
            const link = getRegisterLink();
            navigator.clipboard.writeText(link).then(() => {
                closeShareModal();
                showToast('✅ 방문 신청 링크가 복사되었습니다!');
            }).catch(err => {
                alert('링크 복사에 실패했습니다: ' + err);
            });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
