<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방문객 시스템 통합 허브</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--gray-100, #f8f9fa);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .hub-container {
            width: 90%;
            max-width: 500px;
            background: #fff;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        .hub-title {
            color: #333;
            margin-top: 0;
            margin-bottom: 0.5rem;
            font-size: 1.6rem;
        }
        .hub-desc {
            color: #666;
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .hub-menu {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .hub-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.1rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            transition: transform 0.2s, opacity 0.2s;
            cursor: pointer;
            box-sizing: border-box;
            width: 100%;
        }
        .hub-btn:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }
        
        .btn-register {
            background-color: #007bff;
            color: white;
            border: none;
        }
        
        .btn-copy {
            background-color: #e9ecef;
            color: #495057;
            border: 1px solid #ced4da;
            margin-top: -0.5rem;
            font-size: 0.9rem;
            padding: 0.8rem;
        }
        .btn-copy:hover {
            background-color: #dde2e6;
        }

        .btn-lookup {
            background-color: #28a745;
            color: white;
            border: none;
        }
        
        .btn-admin {
            background-color: #343a40;
            color: white;
            border: none;
            margin-top: 1rem;
        }

        .divider {
            height: 1px;
            background: #e9ecef;
            margin: 1rem 0;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 20px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="hub-container">
        <h1 class="hub-title">방문객 시스템 통합 허브</h1>
        <p class="hub-desc">관리자 및 방문객을 위한 모든 기능을<br>한 곳에서 편리하게 이용하세요.</p>
        
        <div class="hub-menu">
            <a href="register.html" class="hub-btn btn-register">📝 방문객 사전 등록하기</a>
            <button onclick="copyRegisterLink()" class="hub-btn btn-copy">🔗 (등록용) 방문 신청 링크 복사해서 발송하기</button>
            
            <a href="lookup.html" class="hub-btn btn-lookup">🔍 나의 방문 신청 내역 조회하기</a>
            
            <div class="divider"></div>
            
            <a href="admin.html" class="hub-btn btn-admin">⚙️ 방문객 사전 등록 관리자 페이지</a>
        </div>
    </div>

    <div id="toast" class="toast">✅ 방문 신청 링크가 복사되었습니다!</div>

    <script>
        function copyRegisterLink() {
            // 현재 주소의 디렉토리 경로에 register.html을 붙여서 절대 링크 생성
            let currentUrl = window.location.href;
            if (currentUrl.endsWith('index.html')) {
                currentUrl = currentUrl.replace('index.html', '');
            }
            if (!currentUrl.endsWith('/')) {
                currentUrl += '/';
            }
            const registerLink = currentUrl + 'register.html';
            
            navigator.clipboard.writeText(registerLink).then(() => {
                showToast();
            }).catch(err => {
                alert("링크 복사에 실패했습니다: " + err);
            });
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
    </script>
</body>
</html>
